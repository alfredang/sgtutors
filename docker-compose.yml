services:
  db:
    image: postgres:16-alpine
    container_name: sgtutors-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sgtutors
    ports:
      - "5433:5432"
    volumes:
      - sgtutors_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sgtutors_pgdata:
